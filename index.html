<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Maths</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stars-bg"></div>

<div id="app">

    <section id="home-screen" class="screen active">
        <div class="home-logo">
            <div class="logo-icon">🧮</div>
            <h1>Easy<br>Maths</h1>
        </div>
        <p class="tagline">Pick a mode to start practising!</p>
        <div class="mode-cards">
            <button class="mode-card add-card" onclick="startMode('add')">
                <span class="mode-icon">➕</span>
                <span class="mode-label">Addition</span>
                <span class="mode-desc">Add numbers together</span>
            </button>
            <button class="mode-card sub-card" onclick="startMode('sub')">
                <span class="mode-icon">➖</span>
                <span class="mode-label">Subtraction</span>
                <span class="mode-desc">Take numbers away</span>
            </button>
        </div>
        <div class="high-score-display" id="home-high-score"></div>
    </section>

    <section id="number-screen" class="screen">
        <div class="screen-header">
            <button class="back-btn" onclick="goHome()">← Back</button>
            <h2>Choose <span id="pick-mode-label">3</span> Numbers</h2>
        </div>
        <p class="sub-hint">Tap 3 numbers to practise with</p>
        <div id="number-grid" class="number-grid"></div>
        <div class="selected-preview" id="selected-preview">
            <span id="preview-label">Selected: </span>
            <span id="preview-nums">—</span>
        </div>
        <button class="primary-btn start-btn" id="start-game-btn" onclick="beginGame()" disabled>
            Start Game!
        </button>
    </section>

    <section id="game-screen" class="screen">
        <div class="top-bar">
            <div id="lives" class="lives-bar"></div>
            <div id="progress" class="progress-badge">Question 1 of 5</div>
            <button class="icon-btn home-icon-btn" onclick="confirmGoHome()" title="Home">🏠</button>
        </div>

        <div class="question-area">
            <div class="mode-badge" id="mode-badge">Addition</div>
            <h2 id="question" class="question-text"></h2>
        </div>

        <div id="answers" class="answers-grid"></div>

        <div id="feedback-overlay" class="feedback-overlay hidden">
            <span id="feedback-emoji"></span>
        </div>
    </section>

    <section id="result-screen" class="screen">
        <div class="result-card" id="result-card">
            <div class="result-emoji" id="result-emoji"></div>
            <h2 id="result-title"></h2>
            <p id="result-message"></p>
            <div id="result-score" class="result-score"></div>
            <div id="new-high-score-banner" class="new-hs-banner hidden">🏆 New High Score!</div>
            <div class="result-btns">
                <button class="primary-btn" onclick="restartGame()">🔄 Retry</button>
                <button class="secondary-btn" onclick="goHome()">🏠 Home</button>
            </div>
        </div>
    </section>

</div>

<div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <p>Go back to the home screen?<br>Your progress will be lost.</p>
        <div class="modal-btns">
            <button class="primary-btn" onclick="goHome()">Yes, go home</button>
            <button class="secondary-btn" onclick="closeModal()">Keep playing</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
